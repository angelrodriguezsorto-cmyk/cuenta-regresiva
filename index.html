<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuenta Regresiva - Revelación de Género</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#7ec8ff,#ffd1e8);
}

.fondo{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.burbuja{
    position:absolute;
    bottom:-100px;
    font-size:40px;
    animation:subir linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(0) rotate(0deg);
        opacity:1;
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

.contenedor{
    position:relative;
    z-index:2;
    text-align:center;
    background:rgba(255,255,255,.95);
    padding:45px;
    border-radius:25px;
    box-shadow:0 0 30px rgba(0,0,0,.25);
}

h1{
    color:#444;
    margin-bottom:15px;
}

p{
    color:#666;
    margin-bottom:20px;
}

#contador{
    font-size:120px;
    font-weight:bold;
    color:#ff4fa3;
    animation:pulso 1s infinite;
}

/* Detener animación de pulso si el contador está pausado o no ha iniciado */
#contador.pausado {
    animation-play-state: paused;
    color: #999;
}

@keyframes pulso{
    50%{
        transform:scale(1.15);
    }
}

#resultado{
    display:none;
    font-size:55px;
    margin-top:20px;
    font-weight:bold;
}

.confeti{
    position:absolute;
    width:12px;
    height:12px;
    top:-20px;
    z-index:10;
    animation:caer 4s linear infinite;
}

@keyframes caer{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

/* Estilos para el botón de control */
.btn-control {
    margin-top: 15px;
    padding: 15px 30px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background-color: #ff4fa3;
    color: white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.2s ease;
}

.btn-control:hover {
    transform: scale(1.05);
}

/* Color verde cuando está en pausa/listo para continuar o iniciar */
.btn-control.listo-iniciar {
    background-color: #4CAF50;
}
</style>

</head>
<body>

<div class="fondo" id="fondo"></div>

<div class="contenedor">

<h1>🎉 Revelación de Género 🎉</h1>

<p>¿Será Niño 💙 o Niña 🩷?</p>

<!-- El contador inicia estático con la clase 'pausado' -->
<div id="contador" class="pausado">10</div>

<div id="resultado"></div>

<!-- Botón inicial para arrancar la secuencia -->
<button id="btnControl" class="btn-control listo-iniciar">Iniciar Cuenta Regresiva 🚀</button>

</div>

<script>

// Cuenta regresiva
let tiempo=10;
let iniciado=false; // Controla si el temporizador ya arrancó
let enPausa=true;   // Inicia pausado obligatoriamente
let intervalo;

const contador=document.getElementById("contador");
const resultado=document.getElementById("resultado");
const btnControl=document.getElementById("btnControl");

function iniciarContador() {
    intervalo=setInterval(()=>{
        if(!enPausa) {
            tiempo--;
            contador.textContent=tiempo;

            if(tiempo<=0){
                clearInterval(intervalo);
                contador.style.display="none";
                btnControl.style.display="none"; // Esconde el botón al terminar

                const genero="niña";

                if(genero==="niño"){
                    resultado.innerHTML="💙 ¡ES NIÑO! 💙";
                    resultado.style.color="#2196F3";
                    crearConfeti("#2196F3");
                }else{
                    resultado.innerHTML="🩷 ¡ES NIÑA! 🩷";
                    resultado.style.color="#ff4fa3";
                    crearConfeti("#ff4fa3");
                }

                resultado.style.display="block";
            }
        }
    },1000);
}

// Lógica del botón único de control
btnControl.addEventListener("click", () => {
    if (!iniciado) {
        // Primera pulsación: Arranca el contador
        iniciado = true;
        enPausa = false;
        contador.classList.remove("pausado");
        btnControl.textContent = "Pausar ⏸️";
        btnControl.classList.remove("listo-iniciar");
        iniciarContador();
    } else {
        // Pulsaciones siguientes: Pausar o Continuar
        enPausa = !enPausa;
        if(enPausa) {
            btnControl.textContent = "Continuar ▶️";
            btnControl.classList.add("listo-iniciar");
            contador.classList.add("pausado");
        } else {
            btnControl.textContent = "Pausar ⏸️";
            btnControl.classList.remove("listo-iniciar");
            contador.classList.remove("pausado");
        }
    }
});


// Globos flotando
const fondo=document.getElementById("fondo");

const emojis=["🎈","🍼","💙","🩷","☁️"];

for(let i=0;i<30;i++){

    let e=document.createElement("div");
    e.className="burbuja";
    e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left=Math.random()*100+"%";
    e.style.animationDuration=(5+Math.random()*6)+"s";
    e.style.fontSize=(25+Math.random()*35)+"px";

    fondo.appendChild(e);
}


// Confeti
function crearConfeti(color){

    for(let i=0;i<250;i++){

        let c=document.createElement("div");
        c.className="confeti";

        c.style.left=Math.random()*100+"vw";
        c.style.background=color;
        c.style.animationDuration=(2+Math.random()*3)+"s";
        c.style.animationDelay=(Math.random()*2)+"s";

        if(Math.random() < 0.5) {
            c.style.borderRadius = "50%";
        }

        document.body.appendChild(c);
    }
}

</script>

</body>
</html>
